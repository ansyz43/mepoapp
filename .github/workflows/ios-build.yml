name: iOS Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            echo "Available Xcode versions:"
            ls /Applications/ | grep Xcode
            echo "Using default Xcode"
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: List available schemes
        run: |
          cd ios
          xcodebuild -list -project Meepo.xcodeproj

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild build \
            -project Meepo.xcodeproj \
            -scheme Meepo \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_VERSION=5.0 \
            2>&1 | tail -200

      - name: Export .app bundle
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Meepo.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cd "$(dirname "$APP_PATH")"
            zip -r "${GITHUB_WORKSPACE}/Meepo-Simulator.zip" Meepo.app
          else
            echo "App bundle not found"
            exit 1
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Meepo-iOS-Simulator
          path: Meepo-Simulator.zip
          retention-days: 14
