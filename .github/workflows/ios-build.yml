name: iOS Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild build \
            -project Meepo.xcodeproj \
            -scheme Meepo \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | tail -50

      - name: Export .app bundle
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Meepo.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cd "$(dirname "$APP_PATH")"
            zip -r "${GITHUB_WORKSPACE}/Meepo-Simulator.zip" Meepo.app
          else
            echo "App bundle not found"
            exit 1
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Meepo-iOS-Simulator
          path: Meepo-Simulator.zip
          retention-days: 14
