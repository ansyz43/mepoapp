name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep Xcode || true
          echo ""
          echo "=== Current Xcode ==="
          xcode-select -p
          echo ""
          XCODE_PATH=""
          for ver in 16.2 16.1 16.0 15.4 15.3 15.2; do
            if [ -d "/Applications/Xcode_${ver}.app" ]; then
              XCODE_PATH="/Applications/Xcode_${ver}.app/Contents/Developer"
              break
            fi
          done
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app/Contents/Developer 2>/dev/null | head -1)
          fi
          if [ -n "$XCODE_PATH" ]; then
            echo "Selecting: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH"
          fi
          echo ""
          echo "=== Xcode version ==="
          xcodebuild -version
          echo ""
          echo "=== SDK versions ==="
          xcodebuild -showsdks | grep -i simulator

      - name: Verify project
        run: |
          echo "=== Project structure ==="
          ls -la ios/Meepo.xcodeproj/
          ls -la ios/Meepo.xcodeproj/xcshareddata/xcschemes/ || true
          echo ""
          echo "=== Source files ==="
          find ios/Meepo -name "*.swift" | sort
          echo ""
          echo "=== Schemes ==="
          cd ios
          xcodebuild -list -project Meepo.xcodeproj

      - name: Build
        run: |
          cd ios
          xcodebuild build \
            -project Meepo.xcodeproj \
            -scheme Meepo \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package app
        run: |
          echo "=== Searching for built app ==="
          find ~/Library/Developer/Xcode/DerivedData -name "Meepo.app" -type d 2>/dev/null || true
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Meepo.app" -path "*/Debug-iphonesimulator/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Meepo.app" -type d | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            ls -la "$APP_PATH"
            cd "$(dirname "$APP_PATH")"
            zip -r "${GITHUB_WORKSPACE}/Meepo-Simulator.zip" Meepo.app
            echo "Zip size: $(du -h "${GITHUB_WORKSPACE}/Meepo-Simulator.zip")"
          else
            echo "ERROR: Meepo.app not found in DerivedData"
            echo "=== DerivedData contents ==="
            find ~/Library/Developer/Xcode/DerivedData -maxdepth 4 -type d | head -30
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Meepo-iOS-Simulator
          path: Meepo-Simulator.zip
          retention-days: 14
