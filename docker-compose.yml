services:
  db:
    image: postgres:16-alpine
    restart: always
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=8MB
    environment:
      POSTGRES_USER: meepo
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: meepo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meepo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://meepo:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/meepo
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
      META_API_VERSION: ${META_API_VERSION:-v21.0}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  meta_worker:
    build: ./meta_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://meepo:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/meepo
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CF_AIG_TOKEN: ${CF_AIG_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_API_VERSION: ${META_API_VERSION:-v21.0}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data:
